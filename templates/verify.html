{% extends "base.html" %}

{% block title %}Verify Account{% endblock %}

{% block content %}

<div class="container">

    <div class="card">

        <h2>🔐 Verify your account</h2>

        <p style="opacity:0.7; margin-bottom:15px;">
            Enter the code we sent to your email
        </p>

        {% if error %}
            <div style="color:red; margin-bottom:10px;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required
                   value="{{ email if email else '' }}">

            <input type="text"
                   name="code"
                   placeholder="6-digit code"
                   required>

            <button type="submit">Verify account</button>

        </form>

        <div class="auth-footer">
            Already verified?
            <a href="/login">Go to login</a>
        </div>

    </div>

</div>

{% endblock %}
